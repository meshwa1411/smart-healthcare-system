<h2>My Appointments</h2>

<table border="1">

<tr>
    <th>Doctor</th>
    <th>Date</th>
    <th>Time</th>
    <th>Status</th>
</tr>

{% for appointment in appointments %}

<tr>
    <td>{{ appointment.doctor.user.username }}</td>
    <td>{{ appointment.date }}</td>
    <td>{{ appointment.time }}</td>
    <td>{{ appointment.status }}</td>
</tr>

{% endfor %}

</table>
